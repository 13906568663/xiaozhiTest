services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.prod
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    expose:
      - "8000"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* 是 build-time 烤进 JS bundle 的，必须在这里传入
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH}
    restart: unless-stopped
    # 不写 command：使用 web/Dockerfile 里的 CMD ["node", "server.js"]（Next.js standalone）
    environment:
      # 仅作为 SSR 兜底；客户端 bundle 里这个值已在构建期固化，运行时改这里对浏览器无效
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://api:8000/api/v1}
    depends_on:
      - api
    expose:
      - "3000"

  nginx:
    image: nginx:1.27.3-alpine
    restart: unless-stopped
    depends_on:
      - web
      - api
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
